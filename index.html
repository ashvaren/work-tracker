<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ashvaren">
<title>Ashvaren Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    /* Ashvaren palette — navy base, blue accent */
    --bg:        #080c14;
    --surface:   #0e1420;
    --surface-2: #131b2b;
    --border:    #1e2a3d;
    --muted:     #2e3f5c;
    --text-dim:  #5d7494;
    --text:      #a8bdd4;
    --text-hi:   #dde8f2;
    --accent:    #2e6fc4;
    --accent-hi: #4a8fd9;
    --accent-lo: rgba(46, 111, 196, 0.12);
    --accent-md: rgba(46, 111, 196, 0.25);
    --gold:      #b89a5a;
    --gold-lo:   rgba(184, 154, 90, 0.12);
    --danger:    #c0404a;
    --success:   #3a9e74;
    --warn:      #b8864a;
    --radius:    10px;
    --mono:      'DM Mono', monospace;
    --display:   'Cormorant Garamond', Georgia, serif;
    --sans:      'Jost', system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ── Layout ── */
  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    padding: env(safe-area-inset-top, 20px) 0 env(safe-area-inset-bottom, 20px);
  }

  /* ── Header ── */
  .header {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 24px 16px;
    flex-shrink: 0;
    gap: 4px;
    position: relative;
  }

  .header-row {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    position: relative;
  }

  /* Wordmark — Cormorant gives it the weight of the Bosca feel */
  .logo {
    font-family: var(--display);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-hi);
    line-height: 1;
  }

  .logo-dot {
    color: var(--accent-hi);
    margin: 0 2px;
  }

  .tagline {
    font-family: var(--mono);
    font-size: 9.5px;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .tagline span {
    color: var(--muted);
    margin: 0 4px;
  }

  .status-dot {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s ease;
  }

  /* Rule beneath header */
  .header-rule {
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--border), transparent);
    margin: 12px 0 0;
  }

  .status-dot.ready    { background: var(--success);  box-shadow: 0 0 6px var(--success); }
  .status-dot.active   { background: var(--danger);   box-shadow: 0 0 10px var(--danger); animation: pulse 1s infinite; }
  .status-dot.thinking { background: var(--accent-hi); box-shadow: 0 0 8px var(--accent-hi); animation: pulse 0.7s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  /* ── Feed ── */
  .feed {
    flex: 1;
    overflow-y: auto;
    padding: 8px 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    -webkit-overflow-scrolling: touch;
  }

  .feed::-webkit-scrollbar { display: none; }

  .feed-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    text-align: center;
    padding: 40px;
    opacity: 0;
    animation: fadeIn 0.8s 0.4s forwards;
  }

  .feed-empty .monogram {
    font-family: var(--display);
    font-size: 36px;
    font-weight: 500;
    letter-spacing: 0.15em;
    color: var(--border);
    text-transform: uppercase;
  }

  .feed-empty p {
    font-size: 12.5px;
    font-weight: 300;
    line-height: 1.7;
    color: var(--text-dim);
    max-width: 200px;
    font-family: var(--sans);
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  /* ── Feed items ── */
  .entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .entry-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .entry-type {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--accent-lo);
    color: var(--accent);
  }

  .entry-type.reminder { background: rgba(58,158,116,0.1);  color: var(--success); }
  .entry-type.calendar { background: var(--accent-lo);       color: var(--accent-hi); }
  .entry-type.client   { background: var(--gold-lo);         color: var(--gold); }
  .entry-type.note     { background: rgba(93,116,148,0.12);  color: var(--text-dim); }
  .entry-type.confirm  { background: rgba(192,64,74,0.1);    color: var(--danger); }

  .entry-time {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    margin-left: auto;
  }

  .entry-transcript {
    font-size: 12px;
    color: var(--text-dim);
    font-style: italic;
    margin-bottom: 6px;
    line-height: 1.5;
    font-family: var(--mono);
    font-weight: 300;
  }

  .entry-response {
    font-size: 14px;
    color: var(--text-hi);
    line-height: 1.55;
    font-weight: 400;
  }

  /* Confirm entry */
  .entry.needs-confirm {
    border-color: rgba(224,90,90,0.3);
  }

  .confirm-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .btn {
    flex: 1;
    padding: 9px 12px;
    border-radius: 8px;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 0.02em;
  }

  .btn:active { transform: scale(0.97); opacity: 0.8; }

  .btn-confirm {
    background: var(--accent);
    color: #fff;
  }

  .btn-cancel {
    background: var(--border);
    color: var(--text-dim);
  }

  /* Deep mode panel */
  .deep-panel {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 16px 24px;
    flex-shrink: 0;
    display: none;
    flex-direction: column;
    gap: 12px;
    animation: slideUp 0.2s ease;
  }

  .deep-panel.active {
    display: flex;
  }

  .deep-question {
    font-size: 15px;
    color: var(--text-hi);
    line-height: 1.5;
    font-weight: 400;
    font-family: var(--sans);
  }

  .deep-input-row {
    display: flex;
    gap: 8px;
  }

  .deep-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text-hi);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 300;
    outline: none;
    transition: border-color 0.2s;
  }

  .deep-input:focus { border-color: var(--accent); }

  .deep-mic-btn {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    background: var(--accent-lo);
    border: 1px solid var(--accent-md);
    color: var(--accent-hi);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }

  .deep-mic-btn:active { background: var(--accent-md); }

  .deep-close {
    align-self: flex-end;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    cursor: pointer;
    padding: 2px 0;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── Record zone ── */
  .record-zone {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 24px 32px;
    gap: 16px;
    border-top: 1px solid var(--border);
    background: linear-gradient(to top, var(--bg) 60%, transparent);
  }

  .record-hint {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: opacity 0.3s;
    height: 16px;
  }

  /* The button — navy ring, blue accent on record */
  .record-btn {
    position: relative;
    width: 84px;
    height: 84px;
    border-radius: 50%;
    background: var(--surface-2);
    border: 1.5px solid var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, background 0.2s, transform 0.1s, box-shadow 0.2s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    touch-action: none;
    box-shadow: 0 0 0 8px rgba(46,111,196,0), 0 4px 24px rgba(0,0,0,0.4);
  }

  .record-btn.ready {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent-lo), 0 4px 24px rgba(0,0,0,0.4);
  }

  .record-btn::before {
    content: '';
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    border: 1px solid var(--border);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .record-btn.ready::before { opacity: 1; border-color: var(--muted); }

  .record-btn.recording {
    border-color: var(--danger);
    background: rgba(192,64,74,0.08);
    transform: scale(1.05);
    box-shadow: 0 0 0 2px rgba(192,64,74,0.15), 0 4px 24px rgba(0,0,0,0.4);
  }

  .record-btn.recording::before {
    border-color: var(--danger);
    opacity: 1;
    animation: ringPulse 1.2s ease infinite;
  }

  @keyframes ringPulse {
    0%   { inset: -10px; opacity: 0.7; }
    100% { inset: -22px; opacity: 0; }
  }

  .record-btn.thinking {
    border-color: var(--accent-hi);
    box-shadow: 0 0 0 2px var(--accent-lo), 0 4px 24px rgba(0,0,0,0.4);
  }

  .mic-icon {
    width: 26px;
    height: 26px;
    color: var(--text-dim);
    transition: color 0.2s;
  }

  .record-btn.ready     .mic-icon { color: var(--accent-hi); }
  .record-btn.recording .mic-icon { color: var(--danger); }
  .record-btn.thinking  .mic-icon { color: var(--accent-hi); }

  /* Waveform bars (shown while recording) */
  .waveform {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 20px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .waveform.active { opacity: 1; }

  .wave-bar {
    width: 3px;
    background: var(--danger);
    border-radius: 2px;
    animation: wave 0.8s ease infinite;
  }

  .wave-bar:nth-child(1) { animation-delay: 0.0s; }
  .wave-bar:nth-child(2) { animation-delay: 0.1s; }
  .wave-bar:nth-child(3) { animation-delay: 0.2s; }
  .wave-bar:nth-child(4) { animation-delay: 0.1s; }
  .wave-bar:nth-child(5) { animation-delay: 0.0s; }

  @keyframes wave {
    0%, 100% { height: 4px; }
    50%       { height: 18px; }
  }

  /* Sign in */
  .sign-in-btn {
    padding: 10px 20px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: background 0.15s;
  }

  .sign-in-btn:active { background: var(--accent-hi); }

  .sign-in-note {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Transcript preview while speaking */
  .live-transcript {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    font-style: italic;
    min-height: 18px;
    text-align: center;
    padding: 0 24px;
    transition: opacity 0.2s;
    line-height: 1.5;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

</style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="header-row">
      <div class="logo">Ashvaren</div>
      <div class="status-dot" id="statusDot"></div>
    </div>
    <div class="tagline">Clarity <span>·</span> Structure <span>·</span> Growth</div>
    <div class="header-rule"></div>
  </header>

  <!-- Feed -->
  <div class="feed" id="feed">
    <div class="feed-empty" id="feedEmpty">
      <div class="monogram">A</div>
      <p>Hold the button and speak. Release when you're done.</p>
    </div>
  </div>

  <!-- Deep mode panel -->
  <div class="deep-panel" id="deepPanel">
    <div class="deep-question" id="deepQuestion">What's the company name?</div>
    <div class="deep-input-row">
      <input class="deep-input" id="deepInput" type="text" placeholder="Type or tap the mic…" />
      <button class="deep-mic-btn" id="deepMicBtn" title="Speak answer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </button>
    </div>
    <span class="deep-close" id="deepClose">cancel flow</span>
  </div>

  <!-- Record zone -->
  <div class="record-zone">
    <div class="live-transcript" id="liveTranscript"></div>
    <div class="waveform" id="waveform">
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>
    <button class="record-btn" id="recordBtn" aria-label="Hold to record">
      <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <div class="record-hint" id="recordHint">Hold to speak</div>
    <button class="sign-in-btn" id="signInBtn" onclick="signInWithGoogle()" style="display:none">
      Sign in with Google
    </button>
    <div class="sign-in-note" id="signInNote" style="display:none">
      Required to write to your tracker
    </div>
  </div>

</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const WORKER_URL = 'https://ashvaren-assistant.mike-bc0.workers.dev';

// ── State ───────────────────────────────────────────────────────────────────
let recognition     = null;
let isRecording     = false;
let finalTranscript = '';
let deepMode        = { active: false, context: [], pendingAction: null };

// ── Elements ─────────────────────────────────────────────────────────────────
const recordBtn      = document.getElementById('recordBtn');
const statusDot      = document.getElementById('statusDot');
const recordHint     = document.getElementById('recordHint');
const waveform       = document.getElementById('waveform');
const liveTranscript = document.getElementById('liveTranscript');
const feed           = document.getElementById('feed');
const feedEmpty      = document.getElementById('feedEmpty');
const deepPanel      = document.getElementById('deepPanel');
const deepQuestion   = document.getElementById('deepQuestion');
const deepInput      = document.getElementById('deepInput');
const deepMicBtn     = document.getElementById('deepMicBtn');
const deepClose      = document.getElementById('deepClose');

// ── Speech Recognition setup ─────────────────────────────────────────────────
function initRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    setStatus('error');
    addEntry({ type: 'note', transcript: '', response: 'Speech recognition is not supported in this browser. Please use Safari on iOS.' });
    return false;
  }
  recognition = new SR();
  recognition.continuous      = false;
  recognition.interimResults  = true;
  recognition.lang            = 'en-GB';
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isRecording = true;
    setStatus('active');
    waveform.classList.add('active');
    recordHint.textContent = 'Listening…';
  };

  recognition.onresult = (e) => {
    let interim = '';
    finalTranscript = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    liveTranscript.textContent = finalTranscript || interim;
  };

  recognition.onend = () => {
    isRecording = false;
    recordBtn.classList.remove('recording');
    waveform.classList.remove('active');
    if (finalTranscript.trim()) {
      processTranscript(finalTranscript.trim());
    } else {
      setStatus('ready');
      recordHint.textContent = 'Hold to speak';
      liveTranscript.textContent = '';
    }
  };

  recognition.onerror = (e) => {
    isRecording = false;
    recordBtn.classList.remove('recording');
    waveform.classList.remove('active');
    setStatus('ready');
    recordHint.textContent = 'Hold to speak';
    if (e.error !== 'no-speech' && e.error !== 'aborted') {
      addEntry({ type: 'note', transcript: '', response: `Mic error: ${e.error}. Check browser permissions.` });
    }
  };

  return true;
}

// ── Status helpers ───────────────────────────────────────────────────────────
function setStatus(state) {
  statusDot.className = 'status-dot ' + state;
}

// ── Record button: hold to record ────────────────────────────────────────────
function startRecording() {
  if (isRecording) return;
  if (!recognition && !initRecognition()) return;
  finalTranscript = '';
  liveTranscript.textContent = '';
  recordBtn.classList.add('recording');
  try { recognition.start(); } catch(e) { /* already started */ }
}

function stopRecording() {
  if (!isRecording) return;
  try { recognition.stop(); } catch(e) {}
  recordBtn.classList.remove('recording');
}

// Touch events (mobile primary)
recordBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); }, { passive: false });
recordBtn.addEventListener('touchend',   (e) => { e.preventDefault(); stopRecording();  }, { passive: false });

// Mouse events (desktop fallback)
recordBtn.addEventListener('mousedown', startRecording);
recordBtn.addEventListener('mouseup',   stopRecording);
recordBtn.addEventListener('mouseleave', stopRecording);

// ── Process transcript ───────────────────────────────────────────────────────
async function processTranscript(text) {
  setStatus('thinking');
  recordBtn.classList.add('thinking');
  recordHint.textContent = 'Thinking…';

  hideFeedEmpty();

  try {
    const messages = buildMessages(text);
    const result   = await callClaude(messages);
    handleResult(text, result);
  } catch(err) {
    addEntry({ type: 'note', transcript: text, response: `Error: ${err.message}` });
    setStatus('ready');
  } finally {
    recordBtn.classList.remove('thinking');
    recordHint.textContent = 'Hold to speak';
    liveTranscript.textContent = '';
  }
}

// ── Build message array for Claude ──────────────────────────────────────────
function buildMessages(userText) {
  const systemPrompt = `You are the executive assistant and chief of staff for Mike Warriner, founder of Ashvaren Advisory Limited, an independent advisory practice in London serving creative and IP-rich businesses.

Mike's active clients include: Salt Creek, Office Test / Ultra HR, Aceae Nutra, Selka Health, PCC Governance.

Your job is to listen to a voice memo, classify the intent, and return a JSON action object. Be brief and precise. Respond ONLY with valid JSON, no markdown, no preamble.

Action types:
- reminder: { type: "reminder", title: string, datetime: string|null, notes: string|null }
- calendar: { type: "calendar", title: string, datetime: string, duration_mins: number, notes: string|null, confirm_required: true }
- note: { type: "note", client: string|null, content: string }
- new_client: { type: "new_client", confirm_required: true, data: { name: string|null, contact: string|null, engagement_type: string|null }, next_question: string }
- new_project: { type: "new_project", confirm_required: true, data: { name: string|null, goal: string|null }, next_question: string }
- deep_continue: { type: "deep_continue", next_question: string, data: object, complete: boolean, summary: string|null }
- unknown: { type: "unknown", response: string }

Rules:
- calendar and new_client always set confirm_required: true
- For new_client or new_project, if information is missing, set next_question to ask for it
- Keep all strings concise
- Today is ${new Date().toLocaleDateString('en-GB', { weekday:'long', year:'numeric', month:'long', day:'numeric' })}
- Current time is ${new Date().toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' })}`;

  const msgs = [{ role: 'user', content: userText }];

  if (deepMode.active && deepMode.context.length) {
    return [
      ...deepMode.context,
      { role: 'user', content: userText }
    ];
  }

  return msgs;
}

// ── Call Claude via Worker ───────────────────────────────────────────────────
async function callClaude(messages) {
  const response = await fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      messages,
      datetime: new Date().toLocaleString('en-GB', {
        weekday: 'long', year: 'numeric', month: 'long',
        day: 'numeric', hour: '2-digit', minute: '2-digit'
      }),
    }),
  });

  if (!response.ok) {
    throw new Error(`Worker returned ${response.status}`);
  }

  return await response.json();
}

// ── Handle result ────────────────────────────────────────────────────────────
async function handleResult(transcript, result) {
  setStatus('ready');

  if (!googleToken) {
    addEntry({ type: 'note', transcript, response: 'Not signed in to Google. Tap Sign in to connect.' });
    return;
  }

  try {
    // Load current tracker state
    const state = await loadTrackerState();
    if (!state) {
      addEntry({ type: 'note', transcript, response: 'Could not load tracker state from Drive.' });
      return;
    }

    if (result.type === 'reminder' || result.type === 'note') {
      // Add as a task in the tracker
      const engId = resolveEngagement(result.client || result.engagement, state.engagements);
      const task  = {
        id:         't' + Date.now(),
        title:      result.title || result.content,
        engagement: engId || '',
        due:        result.due || (result.type === 'reminder' ? 'today' : 'this-week'),
        done:       false,
      };
      state.tasks.push(task);
      await saveTrackerState(state);

      const engName = engId ? state.engagements.find(e => e.id === engId)?.name : null;
      addEntry({
        type: result.type === 'reminder' ? 'reminder' : 'note',
        transcript,
        response: engName
          ? `Added to tracker under ${engName}: "${task.title}"`
          : `Added to tracker: "${task.title}"`,
      });

    } else if (result.type === 'calendar') {
      addConfirmEntry({
        transcript,
        label: 'calendar',
        message: `Add to calendar: "${result.title}" on ${result.datetime} (${result.duration_mins} min)?`,
        onConfirm: async () => {
          // Add as a task with the date in the title for now
          const task = {
            id:         't' + Date.now(),
            title:      `${result.title} — ${result.datetime}`,
            engagement: '',
            due:        'this-week',
            done:       false,
          };
          state.tasks.push(task);
          await saveTrackerState(state);
        },
      });

    } else if (result.type === 'new_client' || result.type === 'new_project') {
      addEntry({
        type: result.type === 'new_client' ? 'client' : 'note',
        transcript,
        response: result.type === 'new_client'
          ? 'Starting new client setup…'
          : 'Starting new project setup…',
      });
      openDeepMode(result);

    } else if (result.type === 'deep_continue') {
      if (result.complete && result.engagement) {
        // Write new engagement and tasks to tracker
        const newEng = {
          id:           'e' + Date.now(),
          name:         result.engagement.name,
          type:         result.engagement.type || 'Advisory',
          status:       result.engagement.isProspective ? 'prospective' : 'active',
          last:         `Engagement opened via assistant`,
          next:         result.engagement.next || 'Draft NDA and engagement letter',
          deadline:     '',
          contactName:  result.engagement.contact || '',
          contactEmail: '',
          scope:        result.engagement.scope || '',
          notes:        '',
          driveFolder:  null,
          isProspective: result.engagement.isProspective || false,
          lastContact:  new Date().toISOString().split('T')[0],
          history:      [],
          feeType:      '',
          estDays:      null,
          fixedAmount:  null,
          probability:  result.engagement.isProspective ? 25 : 100,
        };
        state.engagements.push(newEng);
        (result.tasks || []).forEach(t => {
          state.tasks.push({
            id:         't' + Date.now() + Math.random(),
            title:      t.title,
            engagement: newEng.id,
            due:        t.due || 'this-week',
            done:       false,
          });
        });
        await saveTrackerState(state);
        closeDeepMode();
        addEntry({
          type: 'client',
          transcript,
          response: `${newEng.name} added to tracker with ${result.tasks?.length || 0} tasks.`,
        });
      } else {
        updateDeepMode(result);
      }

    } else if (result.type === 'engagement_update') {
      // Update an existing engagement's last/next fields
      const eng = state.engagements.find(e =>
        e.id === result.engagementId ||
        e.name.toLowerCase().includes((result.engagementName || '').toLowerCase())
      );
      if (eng) {
        if (result.last) eng.last = result.last;
        if (result.next) eng.next = result.next;
        if (result.status) eng.status = result.status;
        if (result.historyEntry) {
          if (!eng.history) eng.history = [];
          eng.history.push({
            date: new Date().toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' }),
            type: 'assistant',
            text: result.historyEntry,
          });
        }
        await saveTrackerState(state);
        addEntry({
          type: 'note',
          transcript,
          response: `${eng.name} updated in tracker.`,
        });
      } else {
        addEntry({ type: 'note', transcript, response: result.response || 'Got it.' });
      }

    } else {
      addEntry({ type: 'note', transcript, response: result.response || 'Got it.' });
    }

  } catch(err) {
    addEntry({ type: 'note', transcript, response: `Error writing to tracker: ${err.message}` });
  }
}

// ── Resolve engagement by partial name ───────────────────────────────────────
function resolveEngagement(nameHint, engagements) {
  if (!nameHint || !engagements) return null;
  const hint = nameHint.toLowerCase();
  const match = engagements.find(e => e.name.toLowerCase().includes(hint) || hint.includes(e.name.toLowerCase().split(' ')[0]));
  return match ? match.id : null;
}

// ── Deep mode ────────────────────────────────────────────────────────────────
function openDeepMode(result) {
  deepMode.active  = true;
  deepMode.context = [{ role: 'user', content: 'Starting: ' + JSON.stringify(result) }];
  deepMode.pendingAction = result;
  deepQuestion.textContent = result.next_question;
  deepInput.value = '';
  deepPanel.classList.add('active');
  setTimeout(() => deepInput.focus(), 200);
}

function updateDeepMode(result) {
  deepMode.context.push({ role: 'assistant', content: JSON.stringify(result) });
  deepQuestion.textContent = result.next_question;
  deepInput.value = '';
}

function closeDeepMode() {
  deepMode.active  = false;
  deepMode.context = [];
  deepPanel.classList.remove('active');
}

function submitDeepInput(text) {
  if (!text.trim()) return;
  deepMode.context.push({ role: 'user', content: text });
  deepInput.value = '';
  processTranscript(text);
}

deepInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') submitDeepInput(deepInput.value);
});

deepClose.addEventListener('click', () => {
  closeDeepMode();
  addEntry({ type: 'note', transcript: '', response: 'Flow cancelled.' });
});

// Deep mode mic button
deepMicBtn.addEventListener('click', () => {
  if (!recognition && !initRecognition()) return;
  if (isRecording) { recognition.stop(); return; }
  finalTranscript = '';
  recognition.onend = () => {
    isRecording = false;
    if (finalTranscript.trim()) submitDeepInput(finalTranscript.trim());
    // restore normal onend
    recognition.onend = normalOnEnd;
  };
  recognition.start();
  deepMicBtn.style.color = 'var(--danger)';
  setTimeout(() => { deepMicBtn.style.color = ''; }, 3000);
});

function normalOnEnd() {
  isRecording = false;
  recordBtn.classList.remove('recording');
  waveform.classList.remove('active');
  if (finalTranscript.trim()) processTranscript(finalTranscript.trim());
  else { setStatus('ready'); recordHint.textContent = 'Hold to speak'; liveTranscript.textContent = ''; }
}

// ── Feed helpers ─────────────────────────────────────────────────────────────
function hideFeedEmpty() {
  if (feedEmpty) feedEmpty.style.display = 'none';
}

function addEntry({ type, transcript, response }) {
  const el = document.createElement('div');
  el.className = 'entry';
  el.innerHTML = `
    <div class="entry-meta">
      <span class="entry-type ${type}">${type}</span>
      <span class="entry-time">${new Date().toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' })}</span>
    </div>
    ${transcript ? `<div class="entry-transcript">"${transcript}"</div>` : ''}
    <div class="entry-response">${response}</div>
  `;
  feed.appendChild(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function addConfirmEntry({ transcript, label, message, onConfirm }) {
  const el = document.createElement('div');
  el.className = 'entry needs-confirm';
  el.innerHTML = `
    <div class="entry-meta">
      <span class="entry-type confirm">${label}</span>
      <span class="entry-time">${new Date().toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' })}</span>
    </div>
    ${transcript ? `<div class="entry-transcript">"${transcript}"</div>` : ''}
    <div class="entry-response">${message}</div>
    <div class="confirm-actions">
      <button class="btn btn-confirm">Do it</button>
      <button class="btn btn-cancel">Cancel</button>
    </div>
  `;
  el.querySelector('.btn-confirm').addEventListener('click', () => {
    onConfirm();
    el.querySelector('.confirm-actions').remove();
    el.querySelector('.entry-response').textContent = '✓ Done.';
    el.classList.remove('needs-confirm');
  });
  el.querySelector('.btn-cancel').addEventListener('click', () => {
    el.querySelector('.confirm-actions').remove();
    el.querySelector('.entry-response').textContent = 'Cancelled.';
    el.classList.remove('needs-confirm');
  });
  feed.appendChild(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

// ── Google OAuth ─────────────────────────────────────────────────────────────
const DRIVE_SCOPES  = 'https://www.googleapis.com/auth/drive.file';
const DRIVE_FILE    = 'ashvaren-tracker-state.json';
let googleToken     = null;
let driveFileId     = null;

function getClientId() {
  return localStorage.getItem('ashvaren_client_id') || '';
}

function saveClientId(id) {
  localStorage.setItem('ashvaren_client_id', id.trim());
}

function signInWithGoogle() {
  const clientId = getClientId();
  if (!clientId) {
    promptClientId();
    return;
  }
  const redirect = window.location.origin + window.location.pathname;
  window.location.href = `https://accounts.google.com/o/oauth2/v2/auth`
    + `?client_id=${encodeURIComponent(clientId)}`
    + `&redirect_uri=${encodeURIComponent(redirect)}`
    + `&response_type=token`
    + `&scope=${encodeURIComponent(DRIVE_SCOPES)}`
    + `&prompt=consent`;
}

function promptClientId() {
  const existing = getClientId();
  const id = window.prompt(
    'Enter your Google OAuth Client ID\n(from console.cloud.google.com — same one used in the work tracker)',
    existing
  );
  if (id && id.trim()) {
    saveClientId(id.trim());
    signInWithGoogle();
  }
}

function handleOAuthCallback() {
  const hash = window.location.hash;
  if (!hash.includes('access_token')) return false;
  const params = new URLSearchParams(hash.replace('#', '?'));
  const token  = params.get('access_token');
  if (token) {
    localStorage.setItem('google_token', token);
    googleToken = token;
    window.location.hash = '';
    return true;
  }
  return false;
}

// ── Drive helpers ─────────────────────────────────────────────────────────────
async function driveGet(url) {
  const res = await fetch(url, {
    headers: { 'Authorization': `Bearer ${googleToken}` }
  });
  if (res.status === 401) {
    googleToken = null;
    localStorage.removeItem('google_token');
    updateAuthUI();
    throw new Error('Google session expired. Please sign in again.');
  }
  return res;
}

async function ensureDriveFolder(parts) {
  let parentId = 'root';
  for (const name of parts) {
    const q = `name='${name}' and mimeType='application/vnd.google-apps.folder' and '${parentId}' in parents and trashed=false`;
    const r = await driveGet(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id)`);
    const d = await r.json();
    if (d.files && d.files.length) {
      parentId = d.files[0].id;
    } else {
      const c = await fetch('https://www.googleapis.com/drive/v3/files', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${googleToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, mimeType: 'application/vnd.google-apps.folder', parents: [parentId] })
      });
      const f = await c.json();
      parentId = f.id;
    }
  }
  return parentId;
}

async function loadTrackerState() {
  const folderId = await ensureDriveFolder(['Ashvaren', 'Tracker']);
  const q = `name='${DRIVE_FILE}' and '${folderId}' in parents and trashed=false`;
  const r = await driveGet(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id)`);
  const d = await r.json();
  if (!d.files || !d.files.length) return null;
  driveFileId = d.files[0].id;
  const fr = await driveGet(`https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`);
  return await fr.json();
}

async function saveTrackerState(state) {
  if (!driveFileId) return;
  await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, {
    method: 'PATCH',
    headers: {
      'Authorization': `Bearer ${googleToken}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(state, null, 2)
  });
}

// ── Auth UI ───────────────────────────────────────────────────────────────────
function updateAuthUI() {
  const signInBtn = document.getElementById('signInBtn');
  const signInNote = document.getElementById('signInNote');
  if (googleToken) {
    signInBtn.style.display = 'none';
    signInNote.style.display = 'none';
    setStatus('ready');
    recordBtn.classList.add('ready');
  } else {
    signInBtn.style.display = 'inline-flex';
    signInNote.style.display = 'block';
    setStatus('');
    recordBtn.classList.remove('ready');
  }
}

// ── Call Claude via Worker ───────────────────────────────────────────────────
async function callClaude(messages) {
  const response = await fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      messages,
      datetime: new Date().toLocaleString('en-GB', {
        weekday: 'long', year: 'numeric', month: 'long',
        day: 'numeric', hour: '2-digit', minute: '2-digit'
      }),
      googleToken,
      driveFileId,
    }),
  });

  if (!response.ok) {
    throw new Error(`Worker returned ${response.status}`);
  }

  return await response.json();
}

// ── Init ─────────────────────────────────────────────────────────────────────
(async function init() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    setStatus('error');
    recordHint.textContent = 'Use Safari on iOS';
    return;
  }

  // Handle OAuth callback
  handleOAuthCallback();

  // Restore token from storage
  if (!googleToken) {
    googleToken = localStorage.getItem('google_token') || null;
  }

  updateAuthUI();

  // Pre-load Drive file ID so first action is fast
  if (googleToken) {
    try {
      await loadTrackerState();
    } catch(e) {
      // Token may be stale — will surface on first action
      googleToken = null;
      localStorage.removeItem('google_token');
      updateAuthUI();
    }
  }
})();
